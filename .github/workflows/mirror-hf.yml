# Copy this file to a public GitHub repo at .github/workflows/mirror-hf.yml,
# then go to Actions → "Mirror HF model (Transformers.js)" → Run workflow.
# After it finishes (~5-8 minutes), paste this URL into the app's
# Settings → Transformers.js mirror:
#
#   https://raw.githubusercontent.com/<your-username>/<this-repo>/main/models
#
# Files will live at:
#   https://raw.githubusercontent.com/<user>/<repo>/main/models/<ORG>/<NAME>/<file>
#
# Use this workflow for Transformers.js (HF ONNX) models. For MLC models
# (WebLLM), use mirror-raw.yml or mirror-releases.yml instead — the layout
# differs.

name: Mirror HF model (Transformers.js)
on:
  workflow_dispatch:
    inputs:
      hf_model_id:
        description: 'HF model id with org prefix (e.g. HuggingFaceTB/SmolVLM-256M-Instruct)'
        required: true
        default: 'HuggingFaceTB/SmolVLM-256M-Instruct'

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download model files from HF (resolve URLs, no LFS)
        env:
          HF_ID: ${{ github.event.inputs.hf_model_id }}
        run: |
          # Bypass git+LFS entirely on the source side. HF has migrated many
          # large blobs to Xet storage, where `git lfs pull` is a silent no-op
          # — the working tree keeps the LFS pointer text. The HTTPS resolve
          # endpoint serves actual file bytes regardless of storage backend.
          MODEL_DIR="models/${HF_ID}"
          mkdir -p "${MODEL_DIR}/onnx"
          # Hardcoded to SmolVLM-256M-Instruct's file set. Matches the
          # per-subgraph dtype map in src/services/transformersjs.js — when a
          # new curated model is added there, update this list in lockstep.
          # ONNX picks fit under raw.githubusercontent.com's 100 MB cap:
          # embed_tokens_quantized (~27 MB), vision_encoder_q4 (~60 MB),
          # decoder_model_merged_q4 (~82 MB).
          FILES=(
            "config.json"
            "generation_config.json"
            "preprocessor_config.json"
            "processor_config.json"
            "special_tokens_map.json"
            "tokenizer.json"
            "tokenizer_config.json"
            "added_tokens.json"
            "chat_template.json"
            "vocab.json"
            "merges.txt"
            "onnx/embed_tokens_quantized.onnx"
            "onnx/vision_encoder_q4.onnx"
            "onnx/decoder_model_merged_q4.onnx"
          )
          for f in "${FILES[@]}"; do
            url="https://huggingface.co/${HF_ID}/resolve/main/${f}"
            out="${MODEL_DIR}/${f}"
            mkdir -p "$(dirname "$out")"
            # -L follows the CDN/Xet redirect; -f errors on 4xx/5xx so a
            # missing file fails the run loudly instead of silently uploading
            # an HTML error page.
            curl -L -f -sS -o "$out" "$url"
            sz=$(stat -c%s "$out")
            # Sanity check: any real ONNX is >>1MB. A 130-byte file is an
            # LFS pointer that snuck through — fail immediately.
            if [[ "$f" == *.onnx ]] && (( sz < 1048576 )); then
              echo "FAIL: $f is only ${sz} bytes — likely a pointer, not a binary"
              head -c 200 "$out"
              exit 1
            fi
            sz_mb=$(awk "BEGIN{printf \"%.2f\", ${sz}/1024/1024}")
            echo "OK ${f} (${sz} bytes, ${sz_mb} MB)"
          done

      - name: Upload via Contents API (bypass git LFS)
        env:
          HF_ID: ${{ github.event.inputs.hf_model_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # We can't use `git add` / `git push` because the git LFS filter
          # captures binary files even after we strip .gitattributes — the
          # `git lfs install` hooks live somewhere we can't easily unset on the
          # runner. The GitHub Contents API takes base64 content and commits
          # regular blobs unconditionally, bypassing git LFS entirely.
          MODEL_DIR="models/${HF_ID}"
          if [ ! -d "$MODEL_DIR" ]; then
            echo "Model directory $MODEL_DIR not found"
            exit 1
          fi
          total=$(find "$MODEL_DIR" -type f ! -name '.gitattributes' | wc -l)
          echo "Uploading $total files to ${GITHUB_REPOSITORY} via Contents API"
          idx=0
          find "$MODEL_DIR" -type f ! -name '.gitattributes' -print0 | while IFS= read -r -d '' f; do
            idx=$((idx+1))
            name=$(basename "$f")
            sz=$(stat -c%s "$f")
            sz_mb=$(awk "BEGIN{printf \"%.1f\", $sz/1024/1024}")
            # Look up the existing sha if the file is already in main.
            sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${f}" --jq '.sha' 2>/dev/null || true)
            # Build the JSON payload in temp files — base64 of large binaries
            # exceeds ARG_MAX when passed as a command-line argument, so we
            # use jq --rawfile to stream content from disk and pipe the
            # payload to `gh api --input -`.
            b64_file=$(mktemp)
            payload_file=$(mktemp)
            base64 -w0 "$f" > "$b64_file"
            if [ -n "$sha" ]; then
              jq -n --rawfile content "$b64_file" \
                    --arg msg "Mirror ${HF_ID} (${idx}/${total}): ${name}" \
                    --arg sha "$sha" \
                    '{message: $msg, content: $content, sha: $sha}' > "$payload_file"
            else
              jq -n --rawfile content "$b64_file" \
                    --arg msg "Mirror ${HF_ID} (${idx}/${total}): ${name}" \
                    '{message: $msg, content: $content}' > "$payload_file"
            fi
            for attempt in 1 2 3; do
              if gh api -X PUT "repos/${GITHUB_REPOSITORY}/contents/${f}" \
                    --input "$payload_file" --silent; then
                tag=$([ -n "$sha" ] && echo "updated" || echo "new")
                echo "[$idx/$total] $name (${sz_mb}MB, $tag)"
                break
              fi
              if [ "$attempt" = "3" ]; then
                echo "[$idx/$total] $name failed after 3 attempts"
                rm -f "$b64_file" "$payload_file"
                exit 1
              fi
              echo "[$idx/$total] attempt $attempt failed, sleeping 10s"
              sleep 10
            done
            rm -f "$b64_file" "$payload_file"
          done
          echo "Uploaded $total files via Contents API"
