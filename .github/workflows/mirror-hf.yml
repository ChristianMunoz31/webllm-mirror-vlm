# Copy this file to a public GitHub repo at .github/workflows/mirror-hf.yml,
# then go to Actions â†’ "Mirror HF model (Transformers.js)" â†’ Run workflow.
# After it finishes (~5-8 minutes), paste this URL into the app's
# Settings â†’ Transformers.js mirror:
#
#   https://raw.githubusercontent.com/<your-username>/<this-repo>/main/models
#
# Files will live at:
#   https://raw.githubusercontent.com/<user>/<repo>/main/models/<ORG>/<NAME>/<file>
#
# Use this workflow for Transformers.js (HF ONNX) models. For MLC models
# (WebLLM), use mirror-raw.yml or mirror-releases.yml instead â€” the layout
# differs.

name: Mirror HF model (Transformers.js)
on:
  workflow_dispatch:
    inputs:
      hf_model_id:
        description: 'HF model id with org prefix (e.g. HuggingFaceTB/SmolVLM-256M-Instruct)'
        required: true
        default: 'HuggingFaceTB/SmolVLM-256M-Instruct'

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install git-lfs
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Clone HF model
        env:
          HF_ID: ${{ github.event.inputs.hf_model_id }}
        run: |
          rm -rf model
          git clone "https://huggingface.co/${HF_ID}" model
          cd model && git lfs pull && cd ..
          rm -rf model/.git
          # Preserve the org/name path: Transformers.js URL builder will use
          # the full model id as the directory segment.
          mkdir -p "models/${HF_ID}"
          # Move both top-level files and any subdirectories (e.g. onnx/)
          shopt -s dotglob nullglob
          mv model/* "models/${HF_ID}/" 2>/dev/null || true
          rm -rf model
          # CRITICAL: strip the HF repo's .gitattributes. It contains LFS rules
          # like `*.onnx filter=lfs` which would make our `git add` replace
          # binaries with pointer text. We want regular blobs.
          # Use BOTH `rm` (working tree) and `git rm` (staging) so the deletion
          # is recorded even if a previous broken run already committed the
          # .gitattributes â€” without the `git rm`, the committed copy stays
          # and its LFS rules continue to apply.
          rm -f "models/${HF_ID}/.gitattributes"
          git rm -f --ignore-unmatch --cached "models/${HF_ID}/.gitattributes" || true
          # Drop any file over 99 MB â€” raw.githubusercontent.com rejects
          # blobs > 100 MB. The adapter loads only the smaller quantized
          # variants anyway.
          find "models/${HF_ID}" -type f -size +99M -print -delete

      - name: Upload via Contents API (bypass git LFS)
        env:
          HF_ID: ${{ github.event.inputs.hf_model_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # We can't use `git add` / `git push` because the git LFS filter
          # captures binary files even after we strip .gitattributes â€” the
          # `git lfs install` hooks live somewhere we can't easily unset on the
          # runner. The GitHub Contents API takes base64 content and commits
          # regular blobs unconditionally, bypassing git LFS entirely.
          MODEL_DIR="models/${HF_ID}"
          if [ ! -d "$MODEL_DIR" ]; then
            echo "Model directory $MODEL_DIR not found"
            exit 1
          fi
          total=$(find "$MODEL_DIR" -type f ! -name '.gitattributes' | wc -l)
          echo "Uploading $total files to ${GITHUB_REPOSITORY} via Contents API"
          idx=0
          find "$MODEL_DIR" -type f ! -name '.gitattributes' -print0 | while IFS= read -r -d '' f; do
            idx=$((idx+1))
            name=$(basename "$f")
            sz=$(stat -c%s "$f")
            sz_mb=$(awk "BEGIN{printf \"%.1f\", $sz/1024/1024}")
            # Look up the existing sha if the file is already in main (so the
            # PUT updates it instead of conflicting).
            sha=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${f}" --jq '.sha' 2>/dev/null || true)
            for attempt in 1 2 3; do
              if [ -n "$sha" ]; then
                args=(-X PUT "repos/${GITHUB_REPOSITORY}/contents/${f}"
                      -f "message=Mirror ${HF_ID} (${idx}/${total}): ${name}"
                      -F "content=@<(base64 -w0 \"$f\")"
                      -f "sha=${sha}")
              else
                args=(-X PUT "repos/${GITHUB_REPOSITORY}/contents/${f}"
                      -f "message=Mirror ${HF_ID} (${idx}/${total}): ${name}"
                      -F "content=@<(base64 -w0 \"$f\")")
              fi
              # Use bash process substitution to feed base64 without huge inline arg
              content=$(base64 -w0 "$f")
              if [ -n "$sha" ]; then
                if gh api -X PUT "repos/${GITHUB_REPOSITORY}/contents/${f}" \
                    -f "message=Mirror ${HF_ID} (${idx}/${total}): ${name}" \
                    -f "content=${content}" \
                    -f "sha=${sha}" --silent; then
                  echo "[$idx/$total] $name (${sz_mb}MB, updated)"
                  break
                fi
              else
                if gh api -X PUT "repos/${GITHUB_REPOSITORY}/contents/${f}" \
                    -f "message=Mirror ${HF_ID} (${idx}/${total}): ${name}" \
                    -f "content=${content}" --silent; then
                  echo "[$idx/$total] $name (${sz_mb}MB, new)"
                  break
                fi
              fi
              if [ "$attempt" = "3" ]; then
                echo "[$idx/$total] $name failed after 3 attempts"
                exit 1
              fi
              echo "[$idx/$total] attempt $attempt failed, sleeping 10s"
              sleep 10
            done
          done
          echo "Uploaded $total files via Contents API"
